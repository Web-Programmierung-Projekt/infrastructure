name: Deploy Prod

# Prod is always manual — never auto-triggered from upstream pushes.
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (backend | frontend | manual=re-deploy current)"
        required: true
        default: manual
        type: choice
        options:
          - manual
          - backend
          - frontend
      sha:
        description: "Image SHA (required for backend/frontend, ignored for manual)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write SSH key to disk
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking=accept-new" >> ~/.ssh/config

      - name: Deploy via IAP tunnel
        env:
          APP: ${{ github.event.inputs.app }}
          SHA: ${{ github.event.inputs.sha }}
        run: |
          gcloud compute start-iap-tunnel wohnmobil-vm 22 \
            --project global-phalanx-499518-n4 \
            --zone europe-west3-a \
            --local-host-port=localhost:2222 &
          TUNNEL_PID=$!
          for i in $(seq 1 30); do
            nc -z localhost 2222 && break
            sleep 1
          done
          ssh -i ~/.ssh/deploy_key -p 2222 deploy@localhost \
            "cd ~/infrastructure && git pull origin main && ./deploy-incremental.sh prod '$APP' '$SHA'"
          STATUS=$?
          kill $TUNNEL_PID 2>/dev/null || true
          exit $STATUS