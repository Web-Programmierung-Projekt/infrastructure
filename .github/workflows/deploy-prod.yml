name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Image SHA to deploy (leave blank for latest main)"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Deploy prod stack to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/infrastructure
            git pull origin main
            GHCR_OWNER=web-programmierung-projekt \
            GHCR_TAG=${{ github.event.inputs.sha || github.sha }} \
            ./deploy.sh prod --vm
