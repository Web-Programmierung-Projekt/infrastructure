name: Deploy Prod

# Prod is always manual — never auto-triggered from upstream pushes.
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (backend | frontend | manual=re-deploy current)"
        required: true
        default: manual
        type: choice
        options:
          - manual
          - backend
          - frontend
      sha:
        description: "Image SHA (required for backend/frontend, ignored for manual)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via IAP SSH tunnel
        env:
          APP: ${{ github.event.inputs.app }}
          SHA: ${{ github.event.inputs.sha }}
        run: |
          # OS Login gives us a sa_… user; sudo -u deploy switches to the deploy
          # user (passwordless via /etc/sudoers.d/99-deploy-as-sa).
          gcloud compute ssh wohnmobil-vm \
            --project global-phalanx-499518-n4 \
            --zone europe-west3-a \
            --tunnel-through-iap \
            --command "sudo -u deploy bash -lc 'cd ~/infrastructure && git pull origin main && ./deploy-incremental.sh prod \"$APP\" \"$SHA\"'"