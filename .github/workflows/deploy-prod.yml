name: Deploy Prod

# Prod is always manual — never auto-triggered from upstream pushes.
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (backend | frontend | manual=re-deploy current)"
        required: true
        default: manual
        type: choice
        options:
          - manual
          - backend
          - frontend
      sha:
        description: "Image SHA (required for backend/frontend, ignored for manual)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Deploy prod stack to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/infrastructure
            git pull origin main
            ./deploy-incremental.sh prod "${{ github.event.inputs.app }}" "${{ github.event.inputs.sha }}"