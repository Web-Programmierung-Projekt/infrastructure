name: Deploy Test

# Triggered automatically when backend or frontend pushes a new image to GHCR
# (their build.yml fires a repository_dispatch event with the commit SHA).
# Can also be triggered manually for re-deploys / rollbacks.
on:
  repository_dispatch:
    types: [backend-image-pushed, frontend-image-pushed]
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (backend | frontend | manual=re-deploy current)"
        required: true
        default: manual
        type: choice
        options:
          - manual
          - backend
          - frontend
      sha:
        description: "Image SHA (required for backend/frontend, ignored for manual)"
        required: false

# Serialise concurrent test deploys so two PRs merging within seconds don't
# race each other on the .deployed-tags.test file.
concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            case "${{ github.event.action }}" in
              backend-image-pushed)  echo "app=backend"  >> $GITHUB_OUTPUT ;;
              frontend-image-pushed) echo "app=frontend" >> $GITHUB_OUTPUT ;;
            esac
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          else
            echo "app=${{ github.event.inputs.app }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.inputs.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write SSH key to disk
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pre-trust the VM's host key by accepting on first connection.
          # IAP terminates at a Google-internal IP, so we cannot pin the host
          # fingerprint reliably across deploys — accept on first use is fine
          # given the network path is already authenticated by IAP.
          echo "StrictHostKeyChecking=accept-new" >> ~/.ssh/config

      - name: Deploy via IAP tunnel
        env:
          APP: ${{ steps.params.outputs.app }}
          SHA: ${{ steps.params.outputs.sha }}
        run: |
          # Start an IAP tunnel forwarding the VM's port 22 to a local port,
          # then SSH through it with the deploy user's key. This avoids
          # gcloud's auto-managed SSH key files (which kept clashing with
          # --ssh-key-file in CI).
          gcloud compute start-iap-tunnel wohnmobil-vm 22 \
            --project global-phalanx-499518-n4 \
            --zone europe-west3-a \
            --local-host-port=localhost:2222 &
          TUNNEL_PID=$!
          # Wait for the tunnel to be listening (max 30s).
          for i in $(seq 1 30); do
            nc -z localhost 2222 && break
            sleep 1
          done
          ssh -i ~/.ssh/deploy_key -p 2222 deploy@localhost \
            "cd ~/infrastructure && git pull origin main && ./deploy-incremental.sh test '$APP' '$SHA'"
          STATUS=$?
          kill $TUNNEL_PID 2>/dev/null || true
          exit $STATUS