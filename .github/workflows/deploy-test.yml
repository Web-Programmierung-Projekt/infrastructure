name: Deploy Test

# Triggered automatically when backend or frontend pushes a new image to GHCR
# (their build.yml fires a repository_dispatch event with the commit SHA).
# Can also be triggered manually for re-deploys / rollbacks.
on:
  repository_dispatch:
    types: [backend-image-pushed, frontend-image-pushed]
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (backend | frontend | manual=re-deploy current)"
        required: true
        default: manual
        type: choice
        options:
          - manual
          - backend
          - frontend
      sha:
        description: "Image SHA (required for backend/frontend, ignored for manual)"
        required: false

# Serialise concurrent test deploys so two PRs merging within seconds don't
# race each other on the .deployed-tags.test file.
concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            case "${{ github.event.action }}" in
              backend-image-pushed)  echo "app=backend"  >> $GITHUB_OUTPUT ;;
              frontend-image-pushed) echo "app=frontend" >> $GITHUB_OUTPUT ;;
            esac
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          else
            echo "app=${{ github.event.inputs.app }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.inputs.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via IAP SSH tunnel
        env:
          APP: ${{ steps.params.outputs.app }}
          SHA: ${{ steps.params.outputs.sha }}
        run: |
          # OS Login gives us a sa_… user; sudo -u deploy switches to the deploy
          # user (passwordless via /etc/sudoers.d/99-deploy-as-sa).
          gcloud compute ssh wohnmobil-vm \
            --project global-phalanx-499518-n4 \
            --zone europe-west3-a \
            --tunnel-through-iap \
            --command "sudo -u deploy bash -lc 'cd ~/infrastructure && git pull origin main && ./deploy-incremental.sh test \"$APP\" \"$SHA\"'"